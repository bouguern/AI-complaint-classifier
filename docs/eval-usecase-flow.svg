<svg xmlns="http://www.w3.org/2000/svg" width="680" height="530" viewBox="0 0 680 530">
  <style>
    text { font-family: system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .ann { font-size: 11px; font-weight: 500; fill: #854f0b; }
    .name { font-size: 12px; font-weight: 500; fill: #888; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="530" fill="#ffffff"/>

  <!-- Title area -->
  <text x="40" y="18" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f6e56">Eval harness — use case flow</text>

  <!-- Step 1 — Load dataset (gray) -->
  <rect x="150" y="30" width="320" height="44" rx="8" fill="#f0f0ee" stroke="#ccc" stroke-width="0.5"/>
  <text class="th" x="310" y="48" text-anchor="middle" dominant-baseline="central">Load golden dataset</text>
  <text class="ts" x="310" y="64" text-anchor="middle" dominant-baseline="central">EvalDatasetLoader · 20 hand-labeled cases</text>
  <line x1="310" y1="74" x2="310" y2="100" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 2 — Classify (teal) + Thread.sleep annotation -->
  <rect x="150" y="100" width="320" height="44" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
  <text class="th" x="310" y="118" text-anchor="middle" dominant-baseline="central" fill="#085041">Classify each complaint</text>
  <text class="ts" x="310" y="134" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">ComplaintClassifier.classify() · real API call</text>
  <!-- Thread.sleep annotation -->
  <line x1="470" y1="122" x2="488" y2="122" stroke="#ba7517" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="489" y="111" width="168" height="22" rx="4" fill="#faeeda" stroke="#efb444" stroke-width="0.5"/>
  <text class="ann" x="573" y="122" text-anchor="middle" dominant-baseline="central">Thread.sleep(4000ms)</text>
  <line x1="310" y1="144" x2="310" y2="170" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 3 — Structural (blue) -->
  <rect x="150" y="170" width="320" height="44" rx="8" fill="#e6f1fb" stroke="#85b7eb" stroke-width="0.5"/>
  <text class="th" x="310" y="188" text-anchor="middle" dominant-baseline="central" fill="#042c53">Structural check</text>
  <text class="ts" x="310" y="204" text-anchor="middle" dominant-baseline="central" fill="#185fa5">fields present · valid team name · no nulls</text>
  <line x1="310" y1="214" x2="310" y2="240" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 4 — Semantic (blue) -->
  <rect x="150" y="240" width="320" height="44" rx="8" fill="#e6f1fb" stroke="#85b7eb" stroke-width="0.5"/>
  <text class="th" x="310" y="258" text-anchor="middle" dominant-baseline="central" fill="#042c53">Semantic check</text>
  <text class="ts" x="310" y="274" text-anchor="middle" dominant-baseline="central" fill="#185fa5">category · urgency · team vs expected answer</text>
  <line x1="310" y1="284" x2="310" y2="310" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 5 — LLM judge (gray, optional/disabled) + annotation -->
  <rect x="150" y="310" width="320" height="44" rx="8" fill="#f0f0ee" stroke="#ccc" stroke-width="0.5" stroke-dasharray="5 3"/>
  <text class="th" x="310" y="328" text-anchor="middle" dominant-baseline="central" fill="#444">LLM judge (optional)</text>
  <text class="ts" x="310" y="344" text-anchor="middle" dominant-baseline="central" fill="#888">RUN_LLM_JUDGE = false · disabled by default</text>
  <!-- Annotation -->
  <line x1="470" y1="332" x2="488" y2="332" stroke="#ba7517" stroke-width="0.8" stroke-dasharray="3 2"/>
  <rect x="489" y="321" width="148" height="22" rx="4" fill="#faeeda" stroke="#efb444" stroke-width="0.5"/>
  <text class="ann" x="563" y="332" text-anchor="middle" dominant-baseline="central">saves tokens + avoids 429</text>
  <line x1="310" y1="354" x2="310" y2="380" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 6 — Compute score + save (purple) -->
  <rect x="150" y="380" width="320" height="44" rx="8" fill="#eee8fe" stroke="#a89de8" stroke-width="0.5"/>
  <text class="th" x="310" y="398" text-anchor="middle" dominant-baseline="central" fill="#3c3489">Compute score + Save EvalRun</text>
  <text class="ts" x="310" y="414" text-anchor="middle" dominant-baseline="central" fill="#534ab7">score · prompt version stored in PostgreSQL</text>
  <line x1="310" y1="424" x2="310" y2="450" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 7 — Regression + report (gray) -->
  <rect x="150" y="450" width="320" height="44" rx="8" fill="#f0f0ee" stroke="#ccc" stroke-width="0.5"/>
  <text class="th" x="310" y="468" text-anchor="middle" dominant-baseline="central">Regression check + print report</text>
  <text class="ts" x="310" y="484" text-anchor="middle" dominant-baseline="central">v1 vs v2 delta · safe to deploy or roll back</text>

  <!-- Signature -->
  <text class="name" x="636" y="516" text-anchor="end">Mohamed Bouguern</text>
</svg>
