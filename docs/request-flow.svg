<svg xmlns="http://www.w3.org/2000/svg" width="680" height="530" viewBox="0 0 680 530">
  <style>
    text { font-family: system-ui, sans-serif; }
    .th { font-size: 14px; font-weight: 600; fill: #1a1a1a; }
    .ts { font-size: 12px; font-weight: 400; fill: #555; }
    .name { font-size: 12px; font-weight: 500; fill: #888; }
  </style>
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#aaa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="680" height="530" fill="#ffffff"/>

  <!-- Step 1 — Client -->
  <rect x="190" y="30" width="300" height="44" rx="8" fill="#f0f0ee" stroke="#ccc" stroke-width="0.5"/>
  <text class="th" x="340" y="48" text-anchor="middle" dominant-baseline="central">POST /api/complaints</text>
  <text class="ts" x="340" y="64" text-anchor="middle" dominant-baseline="central">Client sends complaint text + metadata</text>
  <line x1="340" y1="74" x2="340" y2="100" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 2 — @Valid -->
  <rect x="190" y="100" width="300" height="44" rx="8" fill="#faeeda" stroke="#efb444" stroke-width="0.5"/>
  <text class="th" x="340" y="118" text-anchor="middle" dominant-baseline="central" fill="#633806">@Valid check</text>
  <text class="ts" x="340" y="134" text-anchor="middle" dominant-baseline="central" fill="#854f0b">blank text → HTTP 400 immediately</text>
  <line x1="340" y1="144" x2="340" y2="170" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 3 — Save Complaint -->
  <rect x="190" y="170" width="300" height="44" rx="8" fill="#eee8fe" stroke="#a89de8" stroke-width="0.5"/>
  <text class="th" x="340" y="188" text-anchor="middle" dominant-baseline="central" fill="#3c3489">Save Complaint → PostgreSQL</text>
  <text class="ts" x="340" y="204" text-anchor="middle" dominant-baseline="central" fill="#534ab7">status: PENDING · UUID assigned</text>
  <line x1="340" y1="214" x2="340" y2="240" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 4 — AI call -->
  <rect x="190" y="240" width="300" height="44" rx="8" fill="#e1f5ee" stroke="#1d9e75" stroke-width="0.5"/>
  <text class="th" x="340" y="258" text-anchor="middle" dominant-baseline="central" fill="#085041">ComplaintClassifier → Groq LLM</text>
  <text class="ts" x="340" y="274" text-anchor="middle" dominant-baseline="central" fill="#0f6e56">Spring AI · prompt template rendered</text>
  <line x1="340" y1="284" x2="340" y2="310" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 5 — Validate result -->
  <rect x="190" y="310" width="300" height="44" rx="8" fill="#faeeda" stroke="#efb444" stroke-width="0.5"/>
  <text class="th" x="340" y="328" text-anchor="middle" dominant-baseline="central" fill="#633806">Validate AI result</text>
  <text class="ts" x="340" y="344" text-anchor="middle" dominant-baseline="central" fill="#854f0b">null fields → ClassificationException</text>
  <line x1="340" y1="354" x2="340" y2="380" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 6 — Save Record -->
  <rect x="190" y="380" width="300" height="44" rx="8" fill="#eee8fe" stroke="#a89de8" stroke-width="0.5"/>
  <text class="th" x="340" y="398" text-anchor="middle" dominant-baseline="central" fill="#3c3489">Save ClassificationRecord</text>
  <text class="ts" x="340" y="414" text-anchor="middle" dominant-baseline="central" fill="#534ab7">category · urgency · prompt version</text>
  <line x1="340" y1="424" x2="340" y2="450" stroke="#aaa" stroke-width="1" marker-end="url(#arr)"/>

  <!-- Step 7 — Response -->
  <rect x="190" y="450" width="300" height="44" rx="8" fill="#eaf3de" stroke="#639922" stroke-width="0.5"/>
  <text class="th" x="340" y="468" text-anchor="middle" dominant-baseline="central" fill="#173404">Return HTTP 200</text>
  <text class="ts" x="340" y="484" text-anchor="middle" dominant-baseline="central" fill="#3b6d11">ClassificationResponse JSON</text>

  <!-- Signature -->
  <text class="name" x="636" y="516" text-anchor="end">Mohamed Bouguern</text>
</svg>
